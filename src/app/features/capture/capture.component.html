<section class="page">
  <h2>Scan diary note</h2>
  <p class="hint">Take a photo or upload an image.</p>

  @if (previewUrl(); as url) {
    <div class="preview-card">
      <img [src]="url" alt="Diary note preview" />
      <div class="preview-actions">
        <button type="button" class="btn btn-secondary" (click)="discardImage()" [disabled]="extracting()">
          Choose another
        </button>
        <button type="button" class="btn btn-primary" (click)="extractText()" [disabled]="extracting()">
          @if (extracting()) {
            Extracting…
          } @else {
            Extract text
          }
        </button>
      </div>
    </div>
  } @else {
    <div class="upload-options">
      <label class="upload-zone">
        <input
          type="file"
          accept="image/*"
          capture="environment"
          (change)="onFileSelected($event)"
          hidden
        />
        <span class="upload-icon" aria-hidden="true">📷</span>
        <span class="upload-title">Take photo</span>
        <span class="upload-sub">Open camera</span>
      </label>
      <label class="upload-zone">
        <input
          type="file"
          accept="image/*"
          (change)="onFileSelected($event)"
          hidden
        />
        <span class="upload-icon" aria-hidden="true">🖼️</span>
        <span class="upload-title">Choose photo</span>
        <span class="upload-sub">Pick from gallery</span>
      </label>
    </div>
    <p class="upload-hint">JPG, PNG · handwriting works best</p>
  }

  @if (error(); as msg) {
    <p class="error" role="alert">{{ msg }}</p>
  }
</section>
